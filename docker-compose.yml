services:
  openclash:
    build:
      context: .
      args:
        OPENCLASH_BUILD_ALPINE_REPO: ${OPENCLASH_BUILD_ALPINE_REPO:-https://dl-cdn.alpinelinux.org/alpine}
        OPENCLASH_BUILD_METACUBEXD_URL: ${OPENCLASH_BUILD_METACUBEXD_URL:-https://codeload.github.com/MetaCubeX/metacubexd/tar.gz/gh-pages}
    image: openclash:custom
    container_name: openclash
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${OPENCLASH_MIXED_PORT}:${OPENCLASH_MIXED_PORT}"
      - "${OPENCLASH_CONTROLLER_PORT}:${OPENCLASH_CONTROLLER_PORT}"
    volumes:
      - openclash-state:/var/lib/openclash
    command: /usr/local/bin/bootstrap-openclash.sh

volumes:
  openclash-state:
