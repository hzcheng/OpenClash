mixed-port: 7890
allow-lan: true
mode: rule
proxies:
  - name: 🇸🇬 SG-01
    type: ss
    server: sg1.example.com
    port: 8388
    cipher: aes-128-gcm
    password: password
  - name: Singapore-02
    type: ss
    server: sg2.example.com
    port: 8388
    cipher: aes-128-gcm
    password: password
  - name: 日本-东京-01
    type: ss
    server: jp1.example.com
    port: 8388
    cipher: aes-128-gcm
    password: password
  - name: US-LA-01
    type: ss
    server: us1.example.com
    port: 8388
    cipher: aes-128-gcm
    password: password
proxy-groups:
  - name: Auto
    type: select
    proxies:
      - 🇸🇬 SG-01
      - Singapore-02
      - 日本-东京-01
      - US-LA-01
rules:
  - MATCH,Auto
